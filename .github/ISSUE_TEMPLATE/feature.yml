name: Feature proposal
description: Propose a new AEHF capability or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What delivery problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: dropdown
    id: depth
    attributes:
      label: Suggested task depth
      options: [Fast, Standard, Deep, Reverse]
